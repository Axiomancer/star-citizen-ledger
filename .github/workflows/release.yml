name: Release

on:
  push:
    tags:
      - 'v*'          # triggers on v0.1.0, v1.2.3, etc.

permissions:
  contents: write     # needed to create GitHub releases

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: powershell
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $env:GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # ── Install workspace deps (server + client) ──────────────────────────
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── Build TypeScript server ───────────────────────────────────────────
      - name: Build server
        run: pnpm run build:server

      # ── Build React client ────────────────────────────────────────────────
      - name: Build client
        run: pnpm run build:client

      # ── Copy server/dist → electron/server-dist ───────────────────────────
      - name: Prepare electron package
        run: node scripts/prepare-electron.js

      # ── Install electron deps (all — electron-builder is a devDep) ──────────
      - name: Install electron dependencies
        working-directory: electron
        run: npm install

      # ── Build the Windows installer and portable exe ──────────────────────
      - name: Build Electron app
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      # ── List what was produced ────────────────────────────────────────────
      - name: List release artifacts
        shell: powershell
        run: Get-ChildItem release -Recurse -Filter "*.exe" | Select-Object Name, Length

      # ── Create GitHub release and upload .exe files ───────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Game Ledger ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## Game Ledger ${{ github.ref_name }}

            ### Install
            - **Installer** (`*Setup*.exe`): recommended — installs to Program Files with Start Menu shortcut
            - **Portable** (`*Portable*.exe`): no installation required, run from anywhere

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### First run
            The app stores your data in `%APPDATA%\Game Ledger\data\` — this persists across updates.
          files: |
            release/**/*.exe
