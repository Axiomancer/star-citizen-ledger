name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

permissions:
  contents: write   # needed to create GitHub releases and upload assets

# ─── Shared build steps ───────────────────────────────────────────────────────
# Each platform job runs the same sequence:
#   1. Install Node + pnpm
#   2. Install workspace deps (server + client)
#   3. Build server TS + Vite client
#   4. Copy server/dist → electron/server-dist
#   5. npm install in electron/
#   6. electron-builder for that platform
#   7. Upload artifacts to the GitHub release

jobs:
  # ── Windows: NSIS installer + portable .exe ──────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build server + client
        run: pnpm run build

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build Windows installers
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: Star Citizen Ledger ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## Star Citizen Ledger ${{ github.ref_name }}

            ### Downloads
            | File | Platform | Notes |
            |---|---|---|
            | `*-Setup-x64.exe` | Windows 10/11 | Installer — adds Start Menu + Desktop shortcut |
            | `*-Portable-x64.exe` | Windows 10/11 | No install needed, run from anywhere |
            | `*-x64.AppImage` | Linux x64 | Universal — mark executable and run |
            | `*-x64.deb` | Ubuntu / Debian | `sudo dpkg -i *.deb` |
            | `*-x64.dmg` | macOS Intel | Drag to Applications |
            | `*-arm64.dmg` | macOS Apple Silicon | Drag to Applications |

            ### Your data
            Data is stored locally on your machine and is never uploaded anywhere:
            - **Windows**: `%APPDATA%\star-citizen-ledger\data\`
            - **Linux**: `~/.config/star-citizen-ledger/data/`
            - **macOS**: `~/Library/Application Support/star-citizen-ledger/data/`

            ### First-run security warning
            These builds are not code-signed. Windows will show a SmartScreen warning — click "More info → Run anyway". Linux/macOS may require you to mark the file as trusted. See the [VirusTotal scan results](https://github.com/Axiomancer/star-citizen-ledger#virus-scan-results-v100) in the README.
          files: release/**/*.exe

  # ── Linux: AppImage + .deb ────────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install system deps for electron-builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libopenjp2-tools rpm fakeroot dpkg

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build server + client
        run: pnpm run build

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build Linux packages
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.AppImage
            release/**/*.deb

  # ── macOS: DMG (Intel + Apple Silicon) ───────────────────────────────────────
  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build server + client
        run: pnpm run build

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.dmg
            release/**/*.zip
